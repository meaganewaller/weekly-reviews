{% assign review = include.review %}
<div class="flex flex-col gap-2">
  <a class="underline decoration-2 decoration-wavy underline-offset-2 text-xl text-purple-600" 
      href="{{ review.url | prepend: site.baseurl }}">
      {{ review.title }}
  </a>
  <div class="text-lg text-purple-500">{{ review.description | default: review.excerpt }}</div>
</div>
